<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MEF LSO Address Validation Ecosystem</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:     #04091A;
      --grid:   rgba(255,255,255,0.03);
      --text:   #E8EDF5;
      --muted:  rgba(232,237,245,0.45);
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--bg);
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(var(--grid) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
      z-index: 0;
    }

    /* Ambient blobs — injected dynamically per group */
    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(110px);
      pointer-events: none;
      z-index: 0;
      opacity: 0;
      animation: blobFade 2s ease forwards;
    }
    @keyframes blobFade { to { opacity: .55; } }

    /* Header */
    #header {
      position: fixed; top: 0; left: 0; right: 0;
      padding: 22px 32px 0;
      z-index: 10; pointer-events: none;
    }
    #title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 26px; font-weight: 700;
      letter-spacing: 1.5px; text-transform: uppercase;
      opacity: 0; animation: slideDown .7s ease .2s forwards;
    }
    #subtitle {
      margin-top: 5px; font-size: 26px;
      color: var(--muted); letter-spacing: .4px;
      opacity: 0; animation: slideDown .7s ease .4s forwards;
    }
    @keyframes slideDown {
      from { opacity:0; transform:translateY(-10px); }
      to   { opacity:1; transform:translateY(0); }
    }

    /* Stats */
    #stats {
      position: fixed; top: 100px; right: 32px;
      display: flex; gap: 28px;
      z-index: 10;
      opacity: 0; animation: slideDown .7s ease .5s forwards;
    }
    .stat { text-align: right; }
    .stat-num {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 28px; font-weight: 700; line-height: 1;
    }
    .stat-lbl { font-size: 11px; color: var(--muted); letter-spacing: .5px; }

    /* Legend */
    #legend {
      position: fixed; bottom: 28px; left: 32px;
      display: flex; flex-wrap: wrap; gap: 20px; align-items: center;
      z-index: 10;
      opacity: 0; animation: slideUp .7s ease .9s forwards;
    }
    @keyframes slideUp {
      from { opacity:0; transform:translateY(10px); }
      to   { opacity:1; transform:translateY(0); }
    }
    .leg { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--muted); }
    .leg-dot { width:12px; height:12px; border-radius:50%; flex-shrink:0; }

    /* Logo */
    #logo {
      position: fixed;
      top: 22px;
      right: 32px;
      z-index: 10;
      opacity: 0;
      animation: slideDown .7s ease 1.1s forwards;
    }
    #logo img {
      height: 64px;
      width: auto;
      filter: brightness(0) invert(1);
      opacity: 0.85;
    }

    /* Hint */
    #hint {
      position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
      font-size: 11px; color: var(--muted);
      z-index: 10; white-space: nowrap;
      opacity: 0; animation: slideUp .7s ease 1s forwards;
    }

    /* Debug bar */
    #debug-bar {
      position: fixed; bottom: 6px; left: 50%; transform: translateX(-50%);
      font-size: 10px; color: rgba(255,255,255,0.35);
      font-family: monospace; z-index: 10;
      opacity: 0; pointer-events: none;
    }

    /* Graph */
    #graph {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      z-index: 5;
      cursor: grab;
    }
    #graph:active { cursor: grabbing; }

    /* Tooltip */
    #tooltip {
      position: fixed;
      background: rgba(8,15,36,0.93);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      pointer-events: auto;
      z-index: 20;
      opacity: 0; transition: opacity .2s;
      backdrop-filter: blur(8px);
    }
    #tooltip .tip-name { font-weight: 600; margin-bottom: 3px; }
    #tooltip .tip-type { font-size: 11px; color: var(--muted); }
    #tooltip .tip-region { font-size: 11px; color: var(--muted); margin-top: 6px; }
    #tooltip .tip-region:empty { display: none; }
    #tooltip .tip-url { font-size: 11px; margin-top: 3px; }
    #tooltip .tip-url a { color: #7AAEE0; text-decoration: none; }
    #tooltip .tip-url a:hover { text-decoration: underline; }
    #tooltip .tip-url:empty { display: none; }
  </style>
</head>
<body>

  <div id="header">
    <div id="title">Interoperable LSO Partners - Illustration</div>
    <div id="subtitle">LSO Address Validation API release 2 (lso.av.2)</div>
  </div>

  <div id="stats"></div>
  <div id="legend"></div>
  <div id="hint">Drag to reposition · Scroll to zoom · Click pinned node to release</div>

  <div id="logo">
    <img src="https://www.mplify.net/wp-content/themes/base/images/logo.svg" alt="Mplify Alliance" />
  </div>
  <div id="debug-bar"></div>
  <svg id="graph"></svg>
  <div id="tooltip">
    <div class="tip-name"></div>
    <div class="tip-type"></div>
    <div class="tip-region"></div>
    <div class="tip-url"></div>
  </div>

  <script>
  (async function() {
  /* ─────────────────────────────────────────────
     PASTE YOUR CSV DATA HERE
     Update nodes_csv and links_csv whenever your
     data changes, then save and refresh.
  ───────────────────────────────────────────── */
  // ── URL parameter support ──────────────────────────────────────────
  // Use ?nodes=GID&links=GID in the browser URL to switch data sources
  // Example: index.html?nodes=111111&links=222222
  const BASE_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQBpMitJ2sH9Y6IIIrm8kd67ndx8E6gHXaM6c5SPvlzI7FE2baDQbYl692ucuTu6vkMHkjAZztKfWv3/pub?single=true&output=csv";
  const DEFAULT_NODES_GID = "1365793813";
  const DEFAULT_LINKS_GID = "1881293424";
  const params     = new URLSearchParams(window.location.search);
  const nodesGid   = params.get("nodes") || DEFAULT_NODES_GID;
  const linksGid   = params.get("links") || DEFAULT_LINKS_GID;
  const NODES_URL  = BASE_URL + "&gid=" + nodesGid;
  const LINKS_URL  = BASE_URL + "&gid=" + linksGid;

  // Debug bar — shows active GIDs and data source
  const debugBar = document.getElementById("debug-bar");
  debugBar.textContent = `nodes gid: ${nodesGid}  |  links gid: ${linksGid}`;
  debugBar.style.opacity = "1";

  // Nodes fetched live from Google Sheets
  let nodes_csv, nodes_source = "live";
  try {
    const resp = await fetch(NODES_URL + "&t=" + Date.now());
    if (!resp.ok) throw new Error("HTTP " + resp.status);
    nodes_csv = await resp.text();
  } catch(e) {
    nodes_source = "fallback";
    console.warn("Could not fetch nodes from Google Sheets:", e);
    // Fallback to last known data
    nodes_csv = `id,label,type,group,importance,url,region,glf,solution provider
hub-buy,Buy side,hub,buy,,,,,
hub-sell,Sell side,hub,sell,,,,,
amartus-buy,Amartus,company,buy,medium,www.amartus.com,Worldwide,,yes
amartus-sell,Amartus,company,sell,medium,www.amartus.com,Worldwide,,yes
att-buy,AT&T,company,buy,high,www.att.com,Worldwide,yes,
cmc-buy,CMC Networks,company,buy,medium,www.cmcnetworks.com,South Africa,,
colt-sell,Colt,company,sell,high,www.colt.net,Europe,yes,
cox-buy,Cox,company,buy,medium,www.cox.com,USA,,
cox-sell,Cox,company,sell,medium,www.cox.com,USA,,
dcconnect-buy,DCConnect,company,buy,low,,,,
dcconnect-sell,DCConnect,company,sell,low,,,,
dt-sell,Deutsche Telekom,company,sell,high,,,yes,
enxoo-buy,Enxoo,company,buy,low,,,,
enxoo-sell,Enxoo,company,sell,low,,,,
eunetworks-sell,euNetworks,company,sell,low,,,yes,
frontier-sell,Frontier,company,sell,medium,,,,
orange-buy,Orange,company,buy,high,www.orange.com,,yes,
orange-sell,Orange,company,sell,high,www.orange.com,,yes,
sparkle-sell,Sparkle,company,sell,high,,,yes,
transunion-buy,Transunion,company,buy,low,,,,yes
transunion-sell,Transunion,company,sell,low,,,,yes`;
  }

  // Links fetched live from Google Sheets
  let links_csv, links_source = "live";
  try {
    const resp = await fetch(LINKS_URL + "&t=" + Date.now());
    if (!resp.ok) throw new Error("HTTP " + resp.status);
    links_csv = await resp.text();
  } catch(e) {
    links_source = "fallback";
    console.warn("Could not fetch links from Google Sheets:", e);
    // Fallback to last known data
    links_csv = `source,target
amartus-buy,hub-buy
amartus-sell,hub-sell
att-buy,hub-buy
cmc-buy,hub-buy
colt-sell,hub-sell
cox-buy,hub-buy
cox-sell,hub-sell
dcconnect-buy,hub-buy
dcconnect-sell,hub-sell
dt-sell,hub-sell
enxoo-buy,hub-buy
enxoo-sell,hub-sell
eunetworks-sell,hub-sell
frontier-sell,hub-sell
orange-buy,hub-buy
orange-sell,hub-sell
sparkle-sell,hub-sell
transunion-buy,hub-buy
transunion-sell,hub-sell
hub-buy,hub-sell`;
  }

  // Update debug bar with source info
  debugBar.textContent = `nodes gid: ${nodesGid} [${nodes_source}]  |  links gid: ${linksGid} [${links_source}]`;

  /* ─────────────────────────────────────────────
     COLOR PALETTE
     Groups are auto-detected from the data.
     Add / change entries here to customise.
     Format: "group-name": { main, light, glow }
  ───────────────────────────────────────────── */
  const palette = {
    buy:     { main:"#3D7BC7", light:"#7AAEE0", glow:"rgba(61,123,199,0.4)"  },
    sell:    { main:"#FD7801", light:"#FFA04D", glow:"rgba(253,120,1,0.4)"   },
    // extras — used automatically for any other group names
    _auto: [
      { main:"#4CAF50", light:"#81C784", glow:"rgba(76,175,80,0.4)"   },
      { main:"#9C27B0", light:"#CE93D8", glow:"rgba(156,39,176,0.4)"  },
      { main:"#00BCD4", light:"#80DEEA", glow:"rgba(0,188,212,0.4)"   },
      { main:"#F44336", light:"#EF9A9A", glow:"rgba(244,67,54,0.4)"   },
      { main:"#FFEB3B", light:"#FFF176", glow:"rgba(255,235,59,0.4)"  },
    ]
  };

  /* ─────────────────────────────────────────────
     PARSE
  ───────────────────────────────────────────── */
  const allRows = d3.csvParse(nodes_csv);
  // Extract meta rows before rendering
  const metaTitle    = allRows.find(d => d.id === "meta-title");
  const metaSubtitle = allRows.find(d => d.id === "meta-subtitle");
  const nodes = allRows.filter(d => d.type !== "meta");
  const links = d3.csvParse(links_csv);

  // Apply dynamic title if present in sheet
  if (metaTitle && metaTitle.label) {
    document.getElementById("title").textContent = metaTitle.label.toUpperCase();
  }
  // Apply dynamic subtitle if present in sheet
  if (metaSubtitle && metaSubtitle.label) {
    document.getElementById("subtitle").textContent = metaSubtitle.label;
  }

  // Assign colors to groups
  const groups   = [...new Set(nodes.map(d => d.group))];
  const colorMap = {};
  let   autoIdx  = 0;
  groups.forEach(g => {
    colorMap[g] = palette[g] || palette._auto[autoIdx++ % palette._auto.length];
  });

  function col(d)    { return colorMap[d.group]; }
  function radius(d) {
    if (d.type === "hub") return 56;
    if (d.importance === "high")   return 42;
    if (d.importance === "low")    return 22;
    return 32; // medium (default)
  }

  // Determine hub-to-hub links (both endpoints have type=hub)
  const nodeById = Object.fromEntries(nodes.map(n => [n.id, n]));

  // Detect labels that appear in both buy and sell groups
  const buyLabels  = new Set(nodes.filter(n => n.group === "buy"  && n.type !== "hub").map(n => n.label));
  const sellLabels = new Set(nodes.filter(n => n.group === "sell" && n.type !== "hub").map(n => n.label));
  const sharedLabels = new Set([...buyLabels].filter(l => sellLabels.has(l)));
  nodes.forEach(n => { n._shared = sharedLabels.has(n.label); });
  links.forEach(l => {
    const s = nodeById[l.source], t = nodeById[l.target];
    l._type = (s?.type === "hub" && t?.type === "hub") ? "hub" : t?.group || s?.group || "default";
  });

  /* ─────────────────────────────────────────────
     AMBIENT BLOBS
  ───────────────────────────────────────────── */
  const blobPositions = [
    { top:"-100px", left:"-100px" },
    { bottom:"-80px", right:"-80px" },
    { top:"40%", left:"50%" },
  ];
  groups.forEach((g, i) => {
    const div = document.createElement("div");
    div.className = "blob";
    const pos = blobPositions[i % blobPositions.length];
    Object.assign(div.style, {
      width:"480px", height:"480px",
      background: colorMap[g].glow,
      animationDelay: `${0.3 + i * 0.3}s`,
      ...pos
    });
    document.body.appendChild(div);
  });

  /* ─────────────────────────────────────────────
     STATS BAR
  ───────────────────────────────────────────── */
  const statsEl = document.getElementById("stats");
  groups.forEach(g => {
    const count = nodes.filter(n => n.group === g && n.type !== "hub").length;
    const c = colorMap[g];
    const div = document.createElement("div");
    div.className = "stat";
    div.innerHTML = `
      <div class="stat-num" style="color:${c.main}">${count}</div>
      <div class="stat-lbl">${g.toUpperCase()} PARTNERS</div>`;
    statsEl.appendChild(div);
  });

  /* ─────────────────────────────────────────────
     LEGEND
  ───────────────────────────────────────────── */
  const legendEl = document.getElementById("legend");
  groups.forEach(g => {
    const c = colorMap[g];
    const div = document.createElement("div");
    div.className = "leg";
    div.innerHTML = `
      <div class="leg-dot" style="background:${c.main};box-shadow:0 0 8px ${c.glow}"></div>
      <span>${g.charAt(0).toUpperCase()+g.slice(1)} Side</span>`;
    legendEl.appendChild(div);
  });

  // Shared participant legend entry
  if (sharedLabels.size > 0) {
    const div = document.createElement("div");
    div.className = "leg";
    div.innerHTML = `
      <div class="leg-dot" style="background:linear-gradient(135deg,#3D7BC7,#FD7801);box-shadow:0 0 8px rgba(156,111,255,0.5)"></div>
      <span>Buy &amp; Sell Sides</span>`;
    legendEl.appendChild(div);
  }

  /* ─────────────────────────────────────────────
     SVG
  ───────────────────────────────────────────── */
  const W = window.innerWidth, H = window.innerHeight;
  const svg = d3.select("#graph").attr("viewBox", [0, 0, W, H]);
  const defs = svg.append("defs");

  // Glow filters — one per group
  groups.forEach(g => {
    const c = colorMap[g];
    ["", "S"].forEach(suffix => {
      const std = suffix ? 5 : 12;
      const f = defs.append("filter")
        .attr("id", `glow-${g}${suffix}`)
        .attr("x","-60%").attr("y","-60%")
        .attr("width","220%").attr("height","220%");
      f.append("feFlood").attr("flood-color", c.main).attr("result","col");
      f.append("feComposite").attr("in","col").attr("in2","SourceAlpha")
        .attr("operator","in").attr("result","col2");
      f.append("feGaussianBlur").attr("in","col2").attr("stdDeviation", std).attr("result","blur");
      const m = f.append("feMerge");
      m.append("feMergeNode").attr("in","blur");
      m.append("feMergeNode").attr("in","SourceGraphic");
    });
  });

  // Gradient for shared-participant ring
  const grad = defs.append("linearGradient")
    .attr("id", "grad-shared")
    .attr("x1", "0%").attr("y1", "0%")
    .attr("x2", "100%").attr("y2", "100%");
  grad.append("stop").attr("offset", "0%")  .attr("stop-color", "#3D7BC7");
  grad.append("stop").attr("offset", "50%") .attr("stop-color", "#9C6FFF");
  grad.append("stop").attr("offset", "100%").attr("stop-color", "#FD7801");

  // Arrow for hub-hub link
  defs.append("marker")
    .attr("id","arrow").attr("viewBox","0 -5 10 10")
    .attr("refX",14).attr("refY",0)
    .attr("markerWidth",6).attr("markerHeight",6).attr("orient","auto")
    .append("path").attr("d","M0,-5L10,0L0,5")
    .attr("fill","rgba(255,255,255,0.3)");

  const g = svg.append("g");

  // Initial 20% zoom-out: centre the view at 0.8 scale
  const initScale = 0.8;
  const initX = (W - W * initScale) / 2;
  const initY = (H - H * initScale) / 2;
  g.attr("transform", `translate(${initX},${initY}) scale(${initScale})`);

  svg.call(
    d3.zoom().scaleExtent([0.2, 5])
      .on("zoom", e => g.attr("transform", e.transform))
  );



  /* ─────────────────────────────────────────────
     SIMULATION
  ───────────────────────────────────────────── */
  const sim = d3.forceSimulation(nodes)
    .force("link", d3.forceLink(links).id(d => d.id)
      .distance(d => d._type === "hub" ? 300 : 200)
      .strength(0.7))
    .force("charge", d3.forceManyBody().strength(-3500))
    .force("center", d3.forceCenter(W / 2, H / 2))
    .force("collide", d3.forceCollide().radius(d => radius(d) + 40).strength(1))
    .force("x", d3.forceX(d => d.group === "buy" ? W * 0.3 : W * 0.7).strength(0.18))
    .force("y", d3.forceY(H / 2).strength(0.05));

  /* ─────────────────────────────────────────────
     LINKS
  ───────────────────────────────────────────── */
  const linkSel = g.append("g").selectAll("path")
    .data(links).join("path")
    .attr("fill", "none")
    .attr("stroke", d => {
      if (d._type === "hub") return "rgba(255,255,255,0.22)";
      const c = colorMap[d._type];
      return c ? c.main.replace(")", ",0.6)").replace("rgb","rgba") : "rgba(255,255,255,0.3)";
    })
    .attr("stroke-width", d => d._type === "hub" ? 2 : 2)
    .attr("stroke-dasharray", d => d._type === "hub" ? "7 4" : null)
    .attr("stroke-linecap", "round")
    .attr("marker-end", d => d._type === "hub" ? "url(#arrow)" : null)
    .attr("d", "M0,0")
    .style("opacity", 0)
    .call(sel => sel.transition().duration(900).delay(500).style("opacity", 1));

  /* ─────────────────────────────────────────────
     NODES
  ───────────────────────────────────────────── */
  const nodeSel = g.append("g").selectAll("g")
    .data(nodes).join("g")
    .style("opacity", 0)
    .style("cursor", "grab")
    .call(
      d3.drag()
        .on("start", (e, d) => {
          if (!e.active) sim.alphaTarget(0.3).restart();
          d.fx = d.x; d.fy = d.y;
        })
        .on("drag", (e, d) => { d.fx = e.x; d.fy = e.y; })
        .on("end",  (e, d) => { if (!e.active) sim.alphaTarget(0); })
    )
    .on("click", (e, d) => {
      if (d.fx != null) {
        d.fx = null; d.fy = null;
        sim.alphaTarget(0.1).restart();
        setTimeout(() => sim.alphaTarget(0), 600);
      }
    })
    .on("mouseover", (e, d) => {
      // Tooltip
      const tip = document.getElementById("tooltip");
      const c = col(d);
      tip.querySelector(".tip-name").textContent = d.label;
      tip.querySelector(".tip-type").textContent =
        d.type === "hub" ? "Hub · LSO Standard Interface" : `${d.group.charAt(0).toUpperCase()+d.group.slice(1)} Side`;
      tip.querySelector(".tip-type").style.color = c.light;
      const regionEl = tip.querySelector(".tip-region");
      regionEl.textContent = d.region ? "🌍 " + d.region : "";
      const urlEl = tip.querySelector(".tip-url");
      if (d.url) {
        const href = d.url.startsWith("http") ? d.url : "https://" + d.url;
        urlEl.innerHTML = `<a href="${href}" target="_blank" rel="noopener">🔗 ${d.url}</a>`;
      } else { urlEl.innerHTML = ""; }
      tip.style.opacity = "1";
      moveTip(e);

      // Highlight: only apply for company nodes
      if (d.type !== "company") return;
      const oppositeGroup = d.group === "buy" ? "sell" : "buy";

      // Determine highlighted node ids: hovered node + all company nodes in opposite group
      const highlightIds = new Set(
        nodes
          .filter(n => n === d || (n.type === "company" && n.group === oppositeGroup))
          .map(n => n.id)
      );

      // Dim/highlight nodes
      nodeSel.transition().duration(150)
        .style("opacity", n => highlightIds.has(n.id) ? 1 : 0.12);

      // Dim/highlight links — highlight links connected to hovered node or opposite group companies
      linkSel.transition().duration(150)
        .style("opacity", l => {
          const sid = l.source.id || l.source;
          const tid = l.target.id || l.target;
          return (highlightIds.has(sid) || highlightIds.has(tid)) ? 1 : 0.06;
        });
    })
    .on("mousemove", e => moveTip(e))
    .on("mouseout", (e, d) => {
      // Delay hide so cursor can travel onto the tooltip
      window._tipHideTimer = setTimeout(() => {
        document.getElementById("tooltip").style.opacity = "0";
        nodeSel.transition().duration(250).style("opacity", 1);
        linkSel.transition().duration(250).style("opacity", 1);
      }, 400);
    });

  function moveTip(e) {
    const tip = document.getElementById("tooltip");
    // Offset of 2px so tooltip is virtually touching the cursor — no gap
    const x = e.clientX + 2, y = e.clientY + 2;
    tip.style.left = (x + tip.offsetWidth  > window.innerWidth  ? e.clientX - tip.offsetWidth  - 2 : x) + "px";
    tip.style.top  = (y + tip.offsetHeight > window.innerHeight ? e.clientY - tip.offsetHeight - 2 : y) + "px";
  }

  // Outer ring (hubs only)
  nodeSel.filter(d => d.type === "hub")
    .append("circle")
    .attr("r", d => radius(d) + 12)
    .attr("fill", "none")
    .attr("stroke", d => col(d).glow)
    .attr("stroke-width", 1)
    .attr("stroke-dasharray", "4 3");

  // Dual-colour ring for shared participants
  nodeSel.filter(d => d._shared)
    .append("circle")
    .attr("r", d => radius(d) + 9)
    .attr("fill", "none")
    .attr("stroke-width", 2.5)
    .attr("stroke", "url(#grad-shared)")
    .attr("opacity", 0.85);

  // Main circle
  nodeSel.append("circle")
    .attr("r", radius)
    .attr("fill", d => {
      const c = col(d);
      return d.type === "hub"
        ? c.main
        : c.main.replace("rgb(","rgba(").replace(")",",0.15)").replace("#","").length > 9
          ? hexToRgba(c.main, 0.15)
          : hexToRgba(c.main, 0.15);
    })
    .attr("stroke", d => col(d).light)
    .attr("stroke-width", d => d.type === "hub" ? 2.5 : 1.5)
    .attr("filter", d => `url(#glow-${d.group}${d.type === "hub" ? "" : "S"})`);

  // Labels — wrapping long labels across two lines
  nodeSel.each(function(d) {
    const grp  = d3.select(this);
    const isHub = d.type === "hub";
    const words = d.label.split(" ");
    // Split into max 2 lines
    const lines = words.length <= 2
      ? words
      : [words.slice(0, Math.ceil(words.length / 2)).join(" "),
         words.slice(Math.ceil(words.length / 2)).join(" ")];
    const companyFs = d.importance === "high" ? "17px" : "11px";
    const lh = isHub ? 17 : (d.importance === "high" ? 19 : 14);
    const totalH = (lines.length - 1) * lh;

    lines.forEach((line, i) => {
      grp.append("text")
        .attr("text-anchor", "middle")
        .attr("dominant-baseline", "central")
        .attr("y", -totalH / 2 + i * lh)
        .attr("fill", isHub ? "#fff" : col(d).light)
        .attr("font-size", isHub ? "20px" : companyFs)
        .attr("font-weight", isHub ? 700 : 500)
        .attr("font-family", isHub
          ? "'Barlow Condensed', sans-serif"
          : "'DM Sans', sans-serif")
        .attr("letter-spacing", isHub ? "1px" : "0.3px")
        .attr("pointer-events", "none")
        .text(isHub ? line.toUpperCase() : line);
    });
  });

  // Count badges on hub nodes
  nodeSel.filter(d => d.type === "hub")
    .each(function(d) {
      const grp   = d3.select(this);
      const count = nodes.filter(n => n.type === "company" && n.group === d.group).length;
      const c     = col(d);
      const bx    = radius(d) * 0.72, by = -radius(d) * 0.72;
      // Badge circle
      grp.append("circle")
        .attr("cx", bx).attr("cy", by)
        .attr("r", 26)
        .attr("fill", d.group === "buy" ? "#1A4A8A" : "#B35500")
        .attr("stroke", c.light)
        .attr("stroke-width", 1.5);
      // Badge number
      grp.append("text")
        .attr("x", bx).attr("y", by)
        .attr("text-anchor", "middle")
        .attr("dominant-baseline", "central")
        .attr("fill", "#fff")
        .attr("font-size", "33px")
        .attr("font-weight", 700)
        .attr("font-family", "'Barlow Condensed', sans-serif")
        .attr("pointer-events", "none")
        .text(count);
    });

  // Keep tooltip visible when cursor moves onto it
  (function() {
    const tip = document.getElementById("tooltip");
    tip.addEventListener("mouseenter", () => {
      clearTimeout(window._tipHideTimer);
    });
    tip.addEventListener("mouseleave", () => {
      tip.style.opacity = "0";
      nodeSel.transition().duration(250).style("opacity", 1);
      linkSel.transition().duration(250).style("opacity", 1);
    });
  })();

  // GLF badge on company nodes where glf === "yes"
  nodeSel.filter(d => d.type === "company" && d.glf && d.glf.toLowerCase() === "yes")
    .each(function(d) {
      const grp = d3.select(this);
      const r   = radius(d);
      // Bottom-left corner of badge sits on the circle edge (top-right area)
      const blx = r * 0.62, bly = -r * 0.62;
      const bw  = 50, bh = 28;
      // Badge background — positioned so bottom-left overlaps circle
      grp.append("rect")
        .attr("x", blx).attr("y", bly - bh)
        .attr("width", bw).attr("height", bh)
        .attr("rx", 4).attr("ry", 4)
        .attr("fill", "#1a1a2e")
        .attr("stroke", col(d).light)
        .attr("stroke-width", 2);
      // Badge label — centred within the rect
      grp.append("text")
        .attr("x", blx + bw / 2).attr("y", bly - bh / 2)
        .attr("text-anchor", "middle")
        .attr("dominant-baseline", "central")
        .attr("fill", col(d).light)
        .attr("font-size", "24px")
        .attr("font-weight", 700)
        .attr("font-family", "'Barlow Condensed', sans-serif")
        .attr("letter-spacing", "0.8px")
        .attr("pointer-events", "none")
        .text("GLF");
    });

  // Solution Provider badge — top-left corner overlaps circle
  nodeSel.filter(d => d.type === "company" && d["solution provider"] && d["solution provider"].toLowerCase() === "yes")
    .each(function(d) {
      const grp = d3.select(this);
      const r   = radius(d);
      const fs  = 12, lh = 14, pad = 8;
      const bw  = 54, bh = lh * 2 + pad * 2;
      // 4:30 position = 135deg clockwise from 12 = (sin135, -cos135) = (0.707, 0.707)
      // Top-left corner of badge just overlaps the circle edge
      const bx  = r * 0.65, by = r * 0.65;
      // Badge background
      grp.append("rect")
        .attr("x", bx).attr("y", by)
        .attr("width", bw).attr("height", bh)
        .attr("rx", 3).attr("ry", 3)
        .attr("fill", "#1a1a2e")
        .attr("stroke", col(d).light)
        .attr("stroke-width", 1.5);
      // Line 1: Solution
      grp.append("text")
        .attr("x", bx + bw / 2).attr("y", by + pad + lh * 0.5)
        .attr("text-anchor", "middle")
        .attr("dominant-baseline", "central")
        .attr("fill", col(d).light)
        .attr("font-size", fs + "px")
        .attr("font-weight", 400)
        .attr("font-family", "'DM Sans', sans-serif")
        .attr("letter-spacing", "0.3px")
        .attr("pointer-events", "none")
        .text("Solution");
      // Line 2: Provider
      grp.append("text")
        .attr("x", bx + bw / 2).attr("y", by + pad + lh * 1.5)
        .attr("text-anchor", "middle")
        .attr("dominant-baseline", "central")
        .attr("fill", col(d).light)
        .attr("font-size", fs + "px")
        .attr("font-weight", 400)
        .attr("font-family", "'DM Sans', sans-serif")
        .attr("letter-spacing", "0.3px")
        .attr("pointer-events", "none")
        .text("Provider");
    });

  // Staggered fade-in
  nodeSel.transition().duration(600)
    .delay((d, i) => 350 + i * 45)
    .style("opacity", 1);

  /* ─────────────────────────────────────────────
     TICK
  ───────────────────────────────────────────── */
  sim.on("tick", () => {
    linkSel.each(function(d) {
      const dx   = d.target.x - d.source.x;
      const dy   = d.target.y - d.source.y;
      const dist = Math.sqrt(dx * dx + dy * dy) || 1;
      const ux   = dx / dist, uy = dy / dist;
      const rs   = radius(d.source), rt = radius(d.target);
      // Edge contact points
      const x1 = d.source.x + ux * rs, y1 = d.source.y + uy * rs;
      const x2 = d.target.x - ux * rt, y2 = d.target.y - uy * rt;
      d3.select(this).attr("d", `M${x1},${y1} L${x2},${y2}`);
    });
    nodeSel.attr("transform", d => `translate(${d.x},${d.y})`);
  });

  /* ─────────────────────────────────────────────
     RESIZE
  ───────────────────────────────────────────── */
  window.addEventListener("resize", () => {
    const W2 = window.innerWidth, H2 = window.innerHeight;
    svg.attr("viewBox", [0, 0, W2, H2]);
    sim.force("center", d3.forceCenter(W2 / 2, H2 / 2))
       .alphaTarget(0.1).restart();
    setTimeout(() => sim.alphaTarget(0), 500);
  });

  /* ─────────────────────────────────────────────
     UTILITY
  ───────────────────────────────────────────── */
  function hexToRgba(hex, a) {
    const r = parseInt(hex.slice(1,3),16);
    const g = parseInt(hex.slice(3,5),16);
    const b = parseInt(hex.slice(5,7),16);
    return `rgba(${r},${g},${b},${a})`;
  }

  })(); // end async IIFE
  </script>
</body>
</html>
